<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="X-UA-Compatible" content="ie=edge">
<title>图文工坊 - 启动中</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #f5f5f5;
  --text: #333;
  --text-secondary: #888;
  --text-muted: #aaa;
  --accent: #1976d2;
  --accent-pulse: rgba(21,101,192,0.06);
  --error-bg: #ffebee;
  --error-text: #c62828;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1c1c1e;
    --text: #e5e5e7;
    --text-secondary: #9a9a9c;
    --text-muted: #6e6e70;
    --accent: #58a6ff;
    --accent-pulse: rgba(88,166,255,0.1);
    --error-bg: #3a1a1a;
    --error-text: #ff8a8a;
  }
}
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  display: flex; justify-content: center; align-items: center;
  height: 100vh; color: var(--text); user-select: none;
}
.container { text-align: center; padding: 20px; }
.spinner {
  width: 44px; height: 44px; margin: 0 auto 24px;
  border: 3px solid color-mix(in srgb, var(--accent) 20%, transparent);
  border-top: 3px solid var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
h2 { font-weight: 500; font-size: 20px; margin-bottom: 10px; }
p { font-size: 14px; color: var(--text-secondary); margin-bottom: 4px; }
.hint { font-size: 12px; color: var(--text-muted); }
.dots { display: inline; }
.error {
  margin-top: 20px; font-size: 13px; display: none;
  background: var(--error-bg); padding: 10px 18px; color: var(--error-text);
  border-radius: 8px; max-width: 300px; margin-left: auto; margin-right: auto;
}
.retry-btn {
  display: none; margin: 16px auto 0;
  background: var(--accent); border: none;
  color: #fff; padding: 8px 24px; border-radius: 20px; cursor: pointer;
  font-size: 14px; font-family: inherit;
}
.frame {
  width: 120px; height: 120px; margin: 0 auto 28px; position: relative;
}
.frame-pulse {
  position: absolute; inset: 0; border-radius: 28px;
  background: var(--accent-pulse);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { transform: scale(1); opacity: 0.6; }
  50% { transform: scale(1.08); opacity: 1; }
}
.frame-icon {
  position: absolute; inset: 0; display: flex;
  align-items: center; justify-content: center;
}
.frame-icon img { width: 56px; height: 56px; border-radius: 12px; object-fit: contain; }
</style>
</head>

<script>
(function() {
  var dots = document.querySelector('.dots');
  var dotCount = 0;
  setInterval(function() {
    dotCount = (dotCount + 1) % 4;

  function check() {

      if (++retries < maxRetries) setTimeout(check, 2000);

        errorEl.style.display = 'block';
        errorEl.textContent = '服务启动超时，请检查日志后重启应用';

    };

  setTimeout(function() { window.location.href = target + '/'; }, 60000);
  check();
})();
