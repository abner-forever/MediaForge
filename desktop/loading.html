<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>MediaForge Loading</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {

      --purple: #8b5cf6;
      --pink: #ec4899;
      --orange: #f59e0b;
      --blue: #3b82f6;

    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {

      display: flex;
      align-items: center;
      justify-content: center;

      font-family:
        Inter,
        -apple-system,
        BlinkMacSystemFont,
        "PingFang SC",
        "Microsoft YaHei",
        sans-serif;

      background:

        radial-gradient(circle at top left,
          rgba(168, 85, 247, .18),
          transparent 28%),

        radial-gradient(circle at top right,
          rgba(251, 146, 60, .16),
          transparent 30%),

        radial-gradient(circle at bottom left,
          rgba(59, 130, 246, .14),
          transparent 30%),

        linear-gradient(135deg,
          #ffffff 0%,
          #f8f5ff 35%,
          #fff7ed 72%,
          #ffffff 100%);
    }


    /* =========================
   背景发光
========================= */

    .bg-blur {

      position: absolute;
      border-radius: 50%;
      filter: blur(90px);

      pointer-events: none;
    }

    .blur1 {
      width: 420px;
      height: 420px;

      background:
        rgba(168, 85, 247, .14);

      top: -120px;
      left: -120px;

      animation:
        blurMove1 8s ease-in-out infinite;
    }

    .blur2 {
      width: 380px;
      height: 380px;

      background:
        rgba(59, 130, 246, .12);

      bottom: -100px;
      right: -100px;

      animation:
        blurMove2 10s ease-in-out infinite;
    }

    @keyframes blurMove1 {

      0%,
      100% {
        transform: translate(0, 0);
      }

      50% {
        transform: translate(50px, 30px);
      }
    }

    @keyframes blurMove2 {

      0%,
      100% {
        transform: translate(0, 0);
      }

      50% {
        transform: translate(-40px, -30px);
      }
    }


    /* =========================
   粒子
========================= */

    .particles {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    .particle {

      position: absolute;

      border-radius: 999px;

      background:
        linear-gradient(135deg,
          rgba(255, 255, 255, .95),
          rgba(139, 92, 246, .25));

      filter: blur(.5px);

      animation:
        float linear infinite;
    }

    @keyframes float {

      from {
        transform:
          translateY(120vh) translateX(0);
        opacity: 0;
      }

      10% {
        opacity: 1;
      }

      90% {
        opacity: 1;
      }

      to {
        transform:
          translateY(-20vh) translateX(80px);

        opacity: 0;
      }
    }


    /* =========================
   主体
========================= */

    .loading-screen {

      position: relative;

      width: 100%;
      height: 100%;

      display: flex;
      align-items: center;
      justify-content: center;
    }

    .center-box {

      position: relative;

      width: 460px;
      height: 460px;

      display: flex;
      align-items: center;
      justify-content: center;
    }


    /* =========================
   能量环
========================= */

    .energy-ring {

      position: absolute;

      width: 320px;
      height: 320px;

      border-radius: 50%;

      animation:
        rotate 10s linear infinite;
    }

    .energy-ring::before {

      content: "";

      position: absolute;
      inset: -2px;

      border-radius: 50%;

      background:
        conic-gradient(from 0deg,
          transparent,
          rgba(139, 92, 246, .95),
          rgba(236, 72, 153, .9),
          rgba(245, 158, 11, .95),
          transparent);

      -webkit-mask:
        radial-gradient(farthest-side,
          transparent calc(100% - 5px),
          #fff calc(100% - 4px));

      opacity: .5;

      filter: blur(6px);
    }

    .ring2 {

      width: 390px;
      height: 390px;

      opacity: .4;

      animation-duration: 18s;
      animation-direction: reverse;
    }

    @keyframes rotate {

      to {
        transform: rotate(360deg);
      }
    }


    /* =========================
   Logo 容器
========================= */

    .logo-wrapper {

      position: relative;
      z-index: 10;

      width: 190px;
      height: 190px;

      border-radius: 44px;

      display: flex;
      align-items: center;
      justify-content: center;

      background:
        rgba(255, 255, 255, .72);

      backdrop-filter: blur(30px);

      border:
        1px solid rgba(255, 255, 255, .95);

      box-shadow:
        0 20px 60px rgba(139, 92, 246, .12),
        0 10px 30px rgba(59, 130, 246, .08),
        inset 0 1px 0 rgba(255, 255, 255, .95);

      overflow: hidden;

      animation:
        logoEnter 1.4s cubic-bezier(.22, 1, .36, 1),
        logoFloat 4s ease-in-out infinite 1.4s;
    }

    .logo-wrapper::before {

      content: "";

      position: absolute;
      inset: -30px;

      border-radius: 50px;

      background:
        radial-gradient(circle,
          rgba(139, 92, 246, .25),
          transparent 70%);

      filter: blur(24px);

      z-index: -1;
    }

    @keyframes logoEnter {

      0% {

        opacity: 0;

        transform:
          translateY(120px) scale(.3) rotate(-18deg);

        filter: blur(20px);
      }

      55% {

        opacity: 1;

        transform:
          translateY(-18px) scale(1.08) rotate(4deg);

        filter: blur(0);
      }

      100% {

        transform:
          translateY(0) scale(1) rotate(0);
      }
    }

    @keyframes logoFloat {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-10px);
      }
    }


    /* =========================
   Logo
========================= */

    .logo {

      width: 136px;
      height: 136px;

      object-fit: contain;

      animation:
        logoGlow 3s ease-in-out infinite;
    }

    @keyframes logoGlow {

      0%,
      100% {

        filter:
          drop-shadow(0 0 10px rgba(139, 92, 246, .22)) drop-shadow(0 0 24px rgba(236, 72, 153, .18));
      }

      50% {

        filter:
          drop-shadow(0 0 16px rgba(59, 130, 246, .32)) drop-shadow(0 0 36px rgba(245, 158, 11, .18));
      }
    }


    /* =========================
   柔光扫过
========================= */

    .scan-light {

      position: absolute;

      width: 240px;
      height: 240px;

      border-radius: 50%;

      background:
        radial-gradient(ellipse at center,
          rgba(255, 255, 255, .75) 0%,
          rgba(255, 255, 255, .22) 30%,
          rgba(255, 255, 255, 0) 72%);

      filter: blur(12px);

      pointer-events: none;

      transform:
        translate(-240px, 120px) rotate(-12deg);

      animation:
        softScan 4.8s ease-in-out infinite;
    }

    @keyframes softScan {

      0% {

        transform:
          translate(-240px, 120px) rotate(-12deg);

        opacity: 0;
      }

      20% {
        opacity: .9;
      }

      50% {

        transform:
          translate(40px, -20px) rotate(-12deg);

        opacity: .65;
      }

      100% {

        transform:
          translate(280px, -180px) rotate(-12deg);

        opacity: 0;
      }
    }


    /* =========================
   飞线
========================= */

    .trail {

      position: absolute;

      width: 240px;
      height: 2px;

      background:
        linear-gradient(90deg,
          transparent,
          rgba(255, 255, 255, .9),
          transparent);

      filter: blur(.5px);

      opacity: .6;
    }

    .t1 {

      top: 32%;
      left: -120px;

      transform: rotate(-18deg);

      animation:
        trailMove1 2.8s linear infinite;
    }

    .t2 {

      bottom: 28%;
      right: -140px;

      transform: rotate(18deg);

      animation:
        trailMove2 3.2s linear infinite 1s;
    }

    @keyframes trailMove1 {

      0% {
        opacity: 0;
        transform:
          translateX(-80px) rotate(-18deg);
      }

      20% {
        opacity: .8;
      }

      100% {
        opacity: 0;
        transform:
          translateX(280px) rotate(-18deg);
      }
    }

    @keyframes trailMove2 {

      0% {
        opacity: 0;
        transform:
          translateX(80px) rotate(18deg);
      }

      20% {
        opacity: .8;
      }

      100% {
        opacity: 0;
        transform:
          translateX(-280px) rotate(18deg);
      }
    }


    /* =========================
   文案
========================= */

    .content {

      position: absolute;
      bottom: 12%;

      text-align: center;

      animation:
        textFade 1.6s ease;
    }

    @keyframes textFade {

      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .title {

      font-size: 36px;
      font-weight: 800;

      letter-spacing: .04em;

      background:
        linear-gradient(90deg,
          #7c3aed,
          #ec4899,
          #f59e0b);

      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .desc {

      margin-top: 16px;

      font-size: 14px;
      line-height: 1.8;

      letter-spacing: .08em;

      color:
        rgba(15, 23, 42, .68);
    }


    /* =========================
   进度条
========================= */

    .progress-wrap {

      position: absolute;
      bottom: 58px;

      width: 260px;
      height: 6px;

      border-radius: 999px;

      overflow: hidden;

      background:
        rgba(255, 255, 255, .65);

      box-shadow:
        inset 0 1px 3px rgba(0, 0, 0, .04);
    }

    .progress-bar {

      width: 40%;
      height: 100%;

      border-radius: inherit;

      background:
        linear-gradient(90deg,
          var(--blue),
          var(--purple),
          var(--pink),
          var(--orange));

      box-shadow:
        0 0 14px rgba(139, 92, 246, .35);

      animation:
        loading 2.2s ease-in-out infinite;
    }

    @keyframes loading {

      0% {
        transform: translateX(-120%);
      }

      100% {
        transform: translateX(340%);
      }
    }


    /* =========================响应式========================= */

    @media (max-width:768px) {

      .center-box {
        transform: scale(.78);
      }

      .title {
        font-size: 28px;
      }

      .desc {
        padding: 0 24px;
        font-size: 13px;
      }
    }
  </style>
</head>

<body>

  <div class="loading-screen">

    <!-- 背景光 -->
    <div class="bg-blur blur1"></div>
    <div class="bg-blur blur2"></div>

    <!-- 粒子 -->
    <div class="particles" id="particles"></div>

    <!-- 飞线 -->
    <div class="trail t1"></div>
    <div class="trail t2"></div>

    <!-- 中心 -->
    <div class="center-box">

      <!-- 能量环 -->
      <div class="energy-ring"></div>
      <div class="energy-ring ring2"></div>

      <!-- logo -->
      <div class="logo-wrapper">

        <img class="logo" src="./assets/logo.png" alt="MediaForge" />

        <!-- 柔光 -->
        <div class="scan-light"></div>

      </div>

    </div>

    <!-- 文案 -->
    <div class="content">

      <div class="title">
        图文工坊
      </div>

      <div class="desc">
        AI 驱动的微信公众号内容生产引擎<br />
        发现 · 过滤 · 重构 · 发布
      </div>

    </div>

    <!-- 进度条 -->
    <div class="progress-wrap">
      <div class="progress-bar"></div>
    </div>

    <!-- 错误提示 -->
    <div id="error" style="display:none;margin-top:24px;font-size:14px;color:#ff6b6b;text-align:center;"></div>
    <button id="retryBtn" style="display:none;margin:12px auto 0;padding:8px 24px;border:1px solid rgba(255,255,255,0.3);border-radius:8px;background:rgba(255,255,255,0.1);color:#fff;font-size:14px;cursor:pointer;" onclick="window.location.reload()">重试</button>

  </div>

  <script>

    const particles =
      document.getElementById('particles');

    for (let i = 0; i < 40; i++) {

      const particle =
        document.createElement('div');

      particle.className = 'particle';

      const size =
        Math.random() * 4 + 2;

      particle.style.width =
        size + 'px';

      particle.style.height =
        size + 'px';

      particle.style.left =
        Math.random() * 100 + '%';

      particle.style.animationDuration =
        (Math.random() * 10 + 10) + 's';

      particle.style.animationDelay =
        (Math.random() * 10) + 's';

      particle.style.opacity =
        Math.random();

      particles.appendChild(particle);
    }
    (function () {
      var retries = 0, maxRetries = 90, target = '__TARGET_URL__';
      var errorEl = document.getElementById('error');
      var retryBtn = document.getElementById('retryBtn');

      function check() {
        var img = new Image();
        img.onload = function () { window.location.href = target + '/'; };
        img.onerror = function () {
          if (++retries < maxRetries) setTimeout(check, 2000);
          else {
            if (errorEl) {
              errorEl.style.display = 'block';
              errorEl.textContent = '服务启动超时，请检查日志后重启应用';
            }
            if (retryBtn) retryBtn.style.display = 'inline-block';
          }
        };
        img.src = target + '/static/logo-icon.png?_=' + Date.now();
      }

      setTimeout(function () { window.location.href = target + '/'; }, 60000);
      check();
    })();

  </script>

</body>

</html>
