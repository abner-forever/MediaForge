<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 智能写作 — MediaForge</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    background: #0f0c29;
    color: #fff;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
  }
  .slide-container {
    position: relative;
    width: 1280px;
    height: 720px;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 30px 80px rgba(0,0,0,0.5);
  }
  .slide {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.6s ease;
    padding: 60px;
  }
  .slide.active { opacity: 1; }
  .slide-title {
    font-size: 48px;
    font-weight: 700;
    margin-bottom: 20px;
    text-align: center;
  }
  .slide-subtitle {
    font-size: 24px;
    color: #c4b5fd;
    margin-bottom: 10px;
  }
  .slide-emoji { font-size: 64px; margin-bottom: 20px; }
  .slide-items {
    display: flex;
    flex-direction: column;
    gap: 14px;
    width: 100%;
    max-width: 700px;
  }
  .slide-item {
    background: rgba(255,255,255,0.06);
    border-left: 4px solid #6366f1;
    border-radius: 10px;
    padding: 16px 20px;
    font-size: 20px;
    color: #e2e8f0;
    line-height: 1.5;
  }
  .slide-hint {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    color: #64748b;
    font-size: 14px;
  }
  .controls {
    position: absolute;
    bottom: 20px;
    right: 30px;
    display: flex;
    gap: 12px;
  }
  .controls button {
    padding: 8px 16px;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 8px;
    background: rgba(255,255,255,0.08);
    color: #c4b5fd;
    font-size: 14px;
    cursor: pointer;
    backdrop-filter: blur(4px);
    transition: all 0.2s;
  }
  .controls button:hover {
    background: rgba(255,255,255,0.15);
    color: #fff;
  }
  .progress-dots {
    position: absolute;
    bottom: 70px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 8px;
  }
  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    transition: all 0.3s;
  }
  .dot.active { background: #818cf8; width: 24px; border-radius: 4px; }
</style>
</head>
<body>
<div class="slide-container">
  <div id="slides"></div>
  <div class="progress-dots" id="dots"></div>
  <div class="controls">
    <button onclick="prevSlide()">◀ 上一页</button>
    <button onclick="nextSlide()">下一页 ▶</button>
  </div>
</div>
<script>
const slides = [{"type": "title", "title": "AI 智能写作", "subtitle": "用 AI 提升写作效率，轻松写出好文章", "emoji": "🤖"}, {"type": "content", "title": "AI 如何辅助写作", "items": ["🧠 智能选题推荐 — 告别选题困难", "📝 一键生成文章框架", "✏️ 内容扩写与润色", "🌐 多语言翻译适配"]}, {"type": "content", "title": "MediaForge AI 功能", "items": ["⚡ 支持多供应商：Mimo / DeepSeek / GLM", "🔌 也支持 OpenAI / Qwen / MiniMax", "🎯根据平台风格自动调整文风", "🔄 支持续写、改写、总结等多模式"]}, {"type": "content", "title": "写作工作流", "items": ["📋 发现热点 → AI 评分筛选", "📸 图片下载 → 水印检测过滤", "📝 AI 生成文章 → 人工微调", "📱 一键发布到公众号"]}, {"type": "content", "title": "实用技巧", "items": ["💡 提供详细的写作指令获得更好效果", "📚 建立自己的素材库供 AI 学习", "🎨 搭配封面选取功能提升点击率", "✅ 发布前用 AI 做合规检测"]}, {"type": "summary", "title": "总结", "items": ["✅ AI 不是替代你，而是放大你的能力", "✅ 用 MediaForge 让写作效率翻倍", "✅ 多尝试不同供应商找到最佳效果"], "emoji": "✨"}];
let current = 0;

function render() {
  const container = document.getElementById('slides');
  const dots = document.getElementById('dots');
  container.innerHTML = slides.map((s, i) => `
    <div class="slide ${i === 0 ? 'active' : ''}" data-index="${i}">
      ${s.type === 'title' ? `
        <div class="slide-emoji">${s.emoji || ''}</div>
        <div class="slide-title">${s.title}</div>
        <div class="slide-subtitle">${s.subtitle || ''}</div>
      ` : s.type === 'summary' ? `
        <div class="slide-emoji">${s.emoji || '✅'}</div>
        <div class="slide-title">${s.title}</div>
        <div class="slide-items">${(s.items || []).map(item => `<div class="slide-item">${item}</div>`).join('')}</div>
      ` : `
        <div class="slide-title">${s.title}</div>
        <div class="slide-items" style="margin-top:20px">${(s.items || []).map(item => `<div class="slide-item">${item}</div>`).join('')}</div>
      `}
    </div>
  `).join('');
  dots.innerHTML = slides.map((_, i) => `<div class="dot ${i === 0 ? 'active' : ''}"></div>`).join('');
}

function showSlide(idx) {
  document.querySelectorAll('.slide').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });
  document.querySelectorAll('.dot').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });
  current = idx;
}

function nextSlide() { showSlide((current + 1) % slides.length); }
function prevSlide() { showSlide((current - 1 + slides.length) % slides.length); }

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextSlide(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); prevSlide(); }
});

render();
</script>
</body>
</html>
