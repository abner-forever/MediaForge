<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>公众号排版技巧 — MediaForge</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    background: #0f0c29;
    color: #fff;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
  }
  .slide-container {
    position: relative;
    width: 1280px;
    height: 720px;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 30px 80px rgba(0,0,0,0.5);
  }
  .slide {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.6s ease;
    padding: 60px;
  }
  .slide.active { opacity: 1; }
  .slide-title {
    font-size: 48px;
    font-weight: 700;
    margin-bottom: 20px;
    text-align: center;
  }
  .slide-subtitle {
    font-size: 24px;
    color: #c4b5fd;
    margin-bottom: 10px;
  }
  .slide-emoji { font-size: 64px; margin-bottom: 20px; }
  .slide-items {
    display: flex;
    flex-direction: column;
    gap: 14px;
    width: 100%;
    max-width: 700px;
  }
  .slide-item {
    background: rgba(255,255,255,0.06);
    border-left: 4px solid #6366f1;
    border-radius: 10px;
    padding: 16px 20px;
    font-size: 20px;
    color: #e2e8f0;
    line-height: 1.5;
  }
  .slide-hint {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    color: #64748b;
    font-size: 14px;
  }
  .controls {
    position: absolute;
    bottom: 20px;
    right: 30px;
    display: flex;
    gap: 12px;
  }
  .controls button {
    padding: 8px 16px;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 8px;
    background: rgba(255,255,255,0.08);
    color: #c4b5fd;
    font-size: 14px;
    cursor: pointer;
    backdrop-filter: blur(4px);
    transition: all 0.2s;
  }
  .controls button:hover {
    background: rgba(255,255,255,0.15);
    color: #fff;
  }
  .progress-dots {
    position: absolute;
    bottom: 70px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 8px;
  }
  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    transition: all 0.3s;
  }
  .dot.active { background: #818cf8; width: 24px; border-radius: 4px; }
</style>
</head>
<body>
<div class="slide-container">
  <div id="slides"></div>
  <div class="progress-dots" id="dots"></div>
  <div class="controls">
    <button onclick="prevSlide()">◀ 上一页</button>
    <button onclick="nextSlide()">下一页 ▶</button>
  </div>
</div>
<script>
const slides = [{"type": "title", "title": "公众号排版技巧", "subtitle": "掌握排版技巧，提升读者阅读体验", "emoji": "📱"}, {"type": "content", "title": "排版的重要性", "items": ["📖 好的排版提高阅读完成率", "👀 降低读者视觉疲劳", "💼 体现专业度和品牌形象", "📊 提高转发和收藏率"]}, {"type": "content", "title": "排版基本原则", "items": ["📏 正文 14-16px，行高 1.6-1.8", "🎯 标题层级分明（H1/H2/H3）", "📝 段落简洁 — 每段不超过 5 行", "🎨 配色统一 — 主色不超过 2 种"]}, {"type": "content", "title": "图文搭配", "items": ["🖼️ 每 300-500 字配一张图", "📐 图片风格保持一致", "💬 图片添加标注说明", "↔️ 合理使用分割线和引用样式"]}, {"type": "content", "title": "MediaForge 排版功能", "items": ["📝 富文本编辑器 — 所见即所得", "🎨 预设样式模板一键应用", "📱 多设备预览效果", "⚡ 一键发布到公众号"]}, {"type": "summary", "title": "总结", "items": ["✅ 排版是内容的加分项", "✅ 保持简洁、统一、有呼吸感", "✅ MediaForge 让排版更轻松"], "emoji": "✨"}];
let current = 0;

function render() {
  const container = document.getElementById('slides');
  const dots = document.getElementById('dots');
  container.innerHTML = slides.map((s, i) => `
    <div class="slide ${i === 0 ? 'active' : ''}" data-index="${i}">
      ${s.type === 'title' ? `
        <div class="slide-emoji">${s.emoji || ''}</div>
        <div class="slide-title">${s.title}</div>
        <div class="slide-subtitle">${s.subtitle || ''}</div>
      ` : s.type === 'summary' ? `
        <div class="slide-emoji">${s.emoji || '✅'}</div>
        <div class="slide-title">${s.title}</div>
        <div class="slide-items">${(s.items || []).map(item => `<div class="slide-item">${item}</div>`).join('')}</div>
      ` : `
        <div class="slide-title">${s.title}</div>
        <div class="slide-items" style="margin-top:20px">${(s.items || []).map(item => `<div class="slide-item">${item}</div>`).join('')}</div>
      `}
    </div>
  `).join('');
  dots.innerHTML = slides.map((_, i) => `<div class="dot ${i === 0 ? 'active' : ''}"></div>`).join('');
}

function showSlide(idx) {
  document.querySelectorAll('.slide').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });
  document.querySelectorAll('.dot').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });
  current = idx;
}

function nextSlide() { showSlide((current + 1) % slides.length); }
function prevSlide() { showSlide((current - 1 + slides.length) % slides.length); }

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextSlide(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); prevSlide(); }
});

render();
</script>
</body>
</html>
