<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>热点内容创作 — MediaForge</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    background: #0f0c29;
    color: #fff;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
  }
  .slide-container {
    position: relative;
    width: 1280px;
    height: 720px;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 30px 80px rgba(0,0,0,0.5);
  }
  .slide {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.6s ease;
    padding: 60px;
  }
  .slide.active { opacity: 1; }
  .slide-title {
    font-size: 48px;
    font-weight: 700;
    margin-bottom: 20px;
    text-align: center;
  }
  .slide-subtitle {
    font-size: 24px;
    color: #c4b5fd;
    margin-bottom: 10px;
  }
  .slide-emoji { font-size: 64px; margin-bottom: 20px; }
  .slide-items {
    display: flex;
    flex-direction: column;
    gap: 14px;
    width: 100%;
    max-width: 700px;
  }
  .slide-item {
    background: rgba(255,255,255,0.06);
    border-left: 4px solid #6366f1;
    border-radius: 10px;
    padding: 16px 20px;
    font-size: 20px;
    color: #e2e8f0;
    line-height: 1.5;
  }
  .slide-hint {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    color: #64748b;
    font-size: 14px;
  }
  .controls {
    position: absolute;
    bottom: 20px;
    right: 30px;
    display: flex;
    gap: 12px;
  }
  .controls button {
    padding: 8px 16px;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 8px;
    background: rgba(255,255,255,0.08);
    color: #c4b5fd;
    font-size: 14px;
    cursor: pointer;
    backdrop-filter: blur(4px);
    transition: all 0.2s;
  }
  .controls button:hover {
    background: rgba(255,255,255,0.15);
    color: #fff;
  }
  .progress-dots {
    position: absolute;
    bottom: 70px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 8px;
  }
  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    transition: all 0.3s;
  }
  .dot.active { background: #818cf8; width: 24px; border-radius: 4px; }
</style>
</head>
<body>
<div class="slide-container">
  <div id="slides"></div>
  <div class="progress-dots" id="dots"></div>
  <div class="controls">
    <button onclick="prevSlide()">◀ 上一页</button>
    <button onclick="nextSlide()">下一页 ▶</button>
  </div>
</div>
<script>
const slides = [{"type": "title", "title": "热点内容创作", "subtitle": "抓住流量密码，打造爆款内容", "emoji": "🔥"}, {"type": "content", "title": "为什么要追热点", "items": ["📈 热点自带流量 — 降低传播成本", "🎯 用户关注度高 — 提升曝光机会", "⏰ 时效性内容更容易被推荐", "💰 爆款内容带来可观的收益"]}, {"type": "content", "title": "如何发现热点", "items": ["🔍 微博热搜 / 头条热榜 / 百度指数", "📊 各平台 trending 话题监控", "🤖 用 AI 辅助分析趋势走向", "📡 MediaForge 自动发现图文素材"]}, {"type": "content", "title": "切入点选择", "items": ["🎯 找与账号定位相关的角度", "💡 提供独特的观点和深度分析", "🔗 结合自身经验增加可信度", "📝 标题要抓人但不要标题党"]}, {"type": "content", "title": "快速响应工作流", "items": ["⚡ 发现热点 → 立即评估", "📸 下载相关图片素材", "🤖 AI 辅助快速成稿", "📱 审核后立即发布"]}, {"type": "summary", "title": "总结", "items": ["✅ 热点是流量放大器，但不是唯一", "✅ 保持自己的风格和观点", "✅ MediaForge 帮你抓住每个热点"], "emoji": "🚀"}];
let current = 0;

function render() {
  const container = document.getElementById('slides');
  const dots = document.getElementById('dots');
  container.innerHTML = slides.map((s, i) => `
    <div class="slide ${i === 0 ? 'active' : ''}" data-index="${i}">
      ${s.type === 'title' ? `
        <div class="slide-emoji">${s.emoji || ''}</div>
        <div class="slide-title">${s.title}</div>
        <div class="slide-subtitle">${s.subtitle || ''}</div>
      ` : s.type === 'summary' ? `
        <div class="slide-emoji">${s.emoji || '✅'}</div>
        <div class="slide-title">${s.title}</div>
        <div class="slide-items">${(s.items || []).map(item => `<div class="slide-item">${item}</div>`).join('')}</div>
      ` : `
        <div class="slide-title">${s.title}</div>
        <div class="slide-items" style="margin-top:20px">${(s.items || []).map(item => `<div class="slide-item">${item}</div>`).join('')}</div>
      `}
    </div>
  `).join('');
  dots.innerHTML = slides.map((_, i) => `<div class="dot ${i === 0 ? 'active' : ''}"></div>`).join('');
}

function showSlide(idx) {
  document.querySelectorAll('.slide').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });
  document.querySelectorAll('.dot').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });
  current = idx;
}

function nextSlide() { showSlide((current + 1) % slides.length); }
function prevSlide() { showSlide((current - 1 + slides.length) % slides.length); }

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextSlide(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); prevSlide(); }
});

render();
</script>
</body>
</html>
