<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>封面设计技巧 — MediaForge</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    background: #0f0c29;
    color: #fff;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
  }
  .slide-container {
    position: relative;
    width: 1280px;
    height: 720px;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 30px 80px rgba(0,0,0,0.5);
  }
  .slide {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.6s ease;
    padding: 60px;
  }
  .slide.active { opacity: 1; }
  .slide-title {
    font-size: 48px;
    font-weight: 700;
    margin-bottom: 20px;
    text-align: center;
  }
  .slide-subtitle {
    font-size: 24px;
    color: #c4b5fd;
    margin-bottom: 10px;
  }
  .slide-emoji { font-size: 64px; margin-bottom: 20px; }
  .slide-items {
    display: flex;
    flex-direction: column;
    gap: 14px;
    width: 100%;
    max-width: 700px;
  }
  .slide-item {
    background: rgba(255,255,255,0.06);
    border-left: 4px solid #6366f1;
    border-radius: 10px;
    padding: 16px 20px;
    font-size: 20px;
    color: #e2e8f0;
    line-height: 1.5;
  }
  .slide-hint {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    color: #64748b;
    font-size: 14px;
  }
  .controls {
    position: absolute;
    bottom: 20px;
    right: 30px;
    display: flex;
    gap: 12px;
  }
  .controls button {
    padding: 8px 16px;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 8px;
    background: rgba(255,255,255,0.08);
    color: #c4b5fd;
    font-size: 14px;
    cursor: pointer;
    backdrop-filter: blur(4px);
    transition: all 0.2s;
  }
  .controls button:hover {
    background: rgba(255,255,255,0.15);
    color: #fff;
  }
  .progress-dots {
    position: absolute;
    bottom: 70px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 8px;
  }
  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    transition: all 0.3s;
  }
  .dot.active { background: #818cf8; width: 24px; border-radius: 4px; }
</style>
</head>
<body>
<div class="slide-container">
  <div id="slides"></div>
  <div class="progress-dots" id="dots"></div>
  <div class="controls">
    <button onclick="prevSlide()">◀ 上一页</button>
    <button onclick="nextSlide()">下一页 ▶</button>
  </div>
</div>
<script>
const slides = [{"type": "title", "title": "封面设计技巧", "subtitle": "如何选择最佳封面，提升点击率", "emoji": "🎨"}, {"type": "content", "title": "封面重要性", "items": ["👁️ 封面是第一印象 — 决定用户是否点击", "📊 好封面可提升 40% 以上点击率", "🎯 封面 = 内容的浓缩广告", "📱 在信息流中脱颖而出"]}, {"type": "content", "title": "设计原则", "items": ["🎯 主题明确 — 一眼看懂内容", "🎨 色彩搭配协调 — 不超过 3 种主色", "📝 文字简洁有力 — 控制在 10 字以内", "🖼️ 图片高清有质感"]}, {"type": "content", "title": "MediaForge 封面工具", "items": ["🖼️ AI 自动选取最佳封面帧", "⭐ 图片评分功能筛选高质量图片", "✂️ 智能裁剪适配各平台尺寸", "💾 素材管理统一存储"]}, {"type": "content", "title": "进阶技巧", "items": ["🔄 A/B 测试不同封面效果", "📰 参考行业标杆账号的封面风格", "🏷️ 建立统一的封面模板系列", "📈 定期分析封面数据优化策略"]}, {"type": "summary", "title": "总结", "items": ["✅ 好封面 = 好内容的通行证", "✅ 遵循设计原则 + 善用工具", "✅ MediaForge 让封面选取更智能"], "emoji": "🎯"}];
let current = 0;

function render() {
  const container = document.getElementById('slides');
  const dots = document.getElementById('dots');
  container.innerHTML = slides.map((s, i) => `
    <div class="slide ${i === 0 ? 'active' : ''}" data-index="${i}">
      ${s.type === 'title' ? `
        <div class="slide-emoji">${s.emoji || ''}</div>
        <div class="slide-title">${s.title}</div>
        <div class="slide-subtitle">${s.subtitle || ''}</div>
      ` : s.type === 'summary' ? `
        <div class="slide-emoji">${s.emoji || '✅'}</div>
        <div class="slide-title">${s.title}</div>
        <div class="slide-items">${(s.items || []).map(item => `<div class="slide-item">${item}</div>`).join('')}</div>
      ` : `
        <div class="slide-title">${s.title}</div>
        <div class="slide-items" style="margin-top:20px">${(s.items || []).map(item => `<div class="slide-item">${item}</div>`).join('')}</div>
      `}
    </div>
  `).join('');
  dots.innerHTML = slides.map((_, i) => `<div class="dot ${i === 0 ? 'active' : ''}"></div>`).join('');
}

function showSlide(idx) {
  document.querySelectorAll('.slide').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });
  document.querySelectorAll('.dot').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });
  current = idx;
}

function nextSlide() { showSlide((current + 1) % slides.length); }
function prevSlide() { showSlide((current - 1 + slides.length) % slides.length); }

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextSlide(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); prevSlide(); }
});

render();
</script>
</body>
</html>
