<!DOCTYPE html>
<html lang="zh-CN" data-theme="auto">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>图文工坊</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="app">
    <!-- 侧边栏 -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <img src="/static/logo.png" alt="图文工坊" class="sidebar-logo-img"
             onerror="this.style.display='none'">
        <h1>图文工坊</h1>
        <p>自动化内容发布</p>
      </div>

      <nav class="nav-items">
        <button class="nav-item active" data-page="dashboard">
          <span class="icon">📊</span> 仪表盘
        </button>
        <button class="nav-item" data-page="discovery">
          <span class="icon">🔍</span> 图片发现
        </button>
        <button class="nav-item" data-page="queue">
          <span class="icon">📝</span> 发布队列
        </button>
        <button class="nav-item" data-page="materials">
          <span class="icon">🖼️</span> 本地素材
        </button>
        <button class="nav-item" data-page="settings">
          <span class="icon">⚙️</span> 设置
        </button>
      </nav>

      <div class="sidebar-footer">
        <div class="theme-switcher">
          <button class="theme-btn" data-theme="light" title="浅色">☀️</button>
          <button class="theme-btn" data-theme="dark" title="深色">🌙</button>
          <button class="theme-btn active" data-theme="auto" title="跟随系统">💻</button>
        </div>
        <div class="version-info">v0.3.0 · 图文工坊</div>
      </div>
    </aside>

    <!-- 主内容区 -->
    <main class="main" id="content">
      <!-- 由 app.js 动态渲染 -->
    </main>
  </div>

  <!-- Toast 容器 -->
  <div class="toast-container" id="toasts"></div>

  <!-- Loading 容器 -->
  <div id="loading" style="display:none"></div>

  <script src="/static/app.js"></script>
</body>
</html>
