name: 构建桌面安装包

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'CLAUDE.md'
      - 'SPEC.md'
      - 'USER_GUIDE.md'
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write

jobs:
  detect-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: 获取下一个版本号
        id: get_version
        run: |
          NEXT_VERSION=$(python3 -c "
          import re, subprocess
          from pathlib import Path
          pyproject = Path('pyproject.toml').read_text('utf-8')
          m = re.search(r'^version\s*=\s*\"([^\"]+)\"', pyproject, re.M)
          major, minor, patch = map(int, m.group(1).split('.'))
          r = subprocess.run(['git', 'tag', '--sort=-version:refname'], capture_output=True, text=True)
          tags = [t.strip() for t in r.stdout.split(chr(10)) if t.strip().startswith('v')]
          latest_tag = tags[0] if tags else None
          if latest_tag:
              r = subprocess.run(['git', 'log', '--format=%B', latest_tag + '..HEAD'], capture_output=True, text=True)
              log = r.stdout
          else:
              log = ''
          has_breaking = bool(re.search(r'BREAKING[ -]CHANGE', log, re.I) or re.search(r'^\w+!:', log, re.M))
          has_feat = bool(re.search(r'^feat', log, re.M))
          has_fix = bool(re.search(r'^fix', log, re.M))
          if has_breaking:
              major += 1; minor = 0; patch = 0
          elif has_feat:
              minor += 1; patch = 0
          elif has_fix:
              patch += 1
          print(str(major) + '.' + str(minor) + '.' + str(patch))
          ")
          if [ -z "$NEXT_VERSION" ]; then
              NEXT_VERSION=$(grep '^version\s*=\s*"' pyproject.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          fi
          echo "version=${NEXT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "检测到版本号: ${NEXT_VERSION}"

  build-macos:
    needs: [detect-version]
    runs-on: macos-latest
    env:
      PYTHON_VERSION: '3.11.9'
      APP_VERSION: ${{ needs.detect-version.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: 设置 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: 设置 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: desktop/web/pnpm-lock.yaml

      - name: 构建前端
        run: |
          cd desktop/web
          pnpm install --frozen-lockfile
          pnpm run build

      - name: 安装 universal2 Python（支持 Intel + Apple Silicon）
        run: |
          curl -L -o python.pkg "https://www.python.org/ftp/python/${PYTHON_VERSION}/python-${PYTHON_VERSION}-macos11.pkg"
          sudo installer -pkg python.pkg -target /
          echo "/usr/local/bin" >> $GITHUB_PATH
          python3 --version

      - name: 缓存 pip
        uses: actions/cache@v5
        with:
          path: ~/Library/Caches/pip
          key: ${{ runner.os }}-pip-universal2-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-universal2-

      - name: 安装 Python 依赖
        run: |
          python3 -m pip install -r requirements.txt pyinstaller pillow

      - name: 安装 Playwright Chromium 浏览器（打包到安装包中）
        run: |
          python3 -m playwright install chromium

      - name: 生成应用图标（icns）
        run: |
          mkdir -p build
          python3 -c "
          from PIL import Image
          import os

          img = Image.open('desktop/static/logo-icon.png')
          size = min(img.size)
          left = (img.width - size) // 2
          top = (img.height - size) // 2
          img = img.crop((left, top, left + size, top + size))

          os.makedirs('build/icon.iconset', exist_ok=True)
          for s in [16, 32, 64, 128, 256, 512, 1024]:
              resized = img.resize((s, s), Image.LANCZOS)
              resized.save(f'build/icon.iconset/icon_{s}x{s}.png')
              if s * 2 <= 1024:
                  resized.save(f'build/icon.iconset/icon_{s}x{s}@2x.png')

          import subprocess
          subprocess.run(['iconutil', '-c', 'icns', 'build/icon.iconset', '-o', 'build/app.icns'], check=True)
          print('icon created: build/app.icns')
          "

      - name: PyInstaller 构建 macOS 通用应用（universal2）
        run: pyinstaller desktop/build.spec --clean

      - name: 创建 DMG（拖拽安装）
        run: |
          ARCH="$(uname -m)"
          bash desktop/build_dmg.sh "${ARCH}" "${APP_VERSION}"

      - name: 上传 DMG 构建产物
        uses: actions/upload-artifact@v7
        with:
          name: MediaForge-macOS-${{ runner.arch }}
          path: MediaForge-macOS-*.dmg

  build-windows:
    needs: [detect-version]
    runs-on: windows-latest
    env:
      APP_VERSION: ${{ needs.detect-version.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: 设置 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: 设置 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: desktop/web/pnpm-lock.yaml

      - name: 构建前端
        shell: bash
        run: |
          cd desktop/web
          pnpm install --frozen-lockfile
          pnpm run build

      - name: 设置 Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装 Python 依赖
        shell: bash
        run: |
          pip install -r requirements.txt pyinstaller pillow

      - name: 安装 Playwright Chromium 浏览器（打包到安装包中）
        shell: bash
        run: |
          python -m playwright install chromium

      - name: 生成应用图标（ico）
        shell: bash
        run: |
          mkdir -p desktop/build
          python -c "
          from PIL import Image
          img = Image.open('desktop/static/logo-icon.png')
          size = min(img.size)
          left = (img.width - size) // 2
          top = (img.height - size) // 2
          img = img.crop((left, top, left + size, top + size))
          img.save('desktop/build/app.ico', sizes=[(256, 256)])
          print('icon created: desktop/build/app.ico')
          "

      - name: PyInstaller 构建 Windows 应用
        shell: bash
        run: pyinstaller desktop/build.spec --clean

      - name: 安装 Inno Setup
        shell: powershell
        run: |
          choco install innosetup --no-progress -y

      - name: 构建安装程序
        shell: cmd
        run: |
          iscc /dMyAppVersion="%APP_VERSION%" desktop\setup.iss

      - name: 重命名安装包
        shell: cmd
        run: |
          ren dist\MediaForge-Windows-Setup.exe MediaForge-Windows-Setup-%APP_VERSION%.exe

      - name: 上传安装包
        uses: actions/upload-artifact@v7
        with:
          name: MediaForge-Windows-${{ env.APP_VERSION }}
          path: dist/MediaForge-Windows-Setup-*.exe

  create-release:
    needs: [detect-version, build-macos, build-windows]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: 配置 git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: 安装 python-semantic-release
        run: pip install python-semantic-release

      - name: 记录当前最新 tag
        id: before
        run: echo "tag=$(git tag --sort=-creatordate | head -1 || echo '')" >> $GITHUB_OUTPUT

      - name: Semantic Release — 自动版本号 + 发布
        id: semantic
        run: semantic-release version --skip-build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 获取新版 tag
        id: after
        run: |
          NEW_TAG=$(git tag --sort=-creatordate | head -1 || echo '')
          echo "tag=${NEW_TAG}" >> $GITHUB_OUTPUT
          if [ "${NEW_TAG}" != "${{ steps.before.outputs.tag }}" ] && [ -n "${NEW_TAG}" ]; then
            echo "new=true" >> $GITHUB_OUTPUT
          else
            echo "new=false" >> $GITHUB_OUTPUT
          fi

      - name: 下载构建产物
        if: steps.after.outputs.new == 'true'
        uses: actions/download-artifact@v8
        with:
          pattern: MediaForge-*
          merge-multiple: true

      - name: 上传构件到 Release
        if: steps.after.outputs.new == 'true'
        shell: bash
        run: |
          gh release upload "${{ steps.after.outputs.tag }}" \
            MediaForge-macOS-*.dmg \
            MediaForge-Windows-Setup-*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}